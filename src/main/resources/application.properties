spring.application.name=server

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:neostride}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_HIKARI_MAX_POOL_SIZE:15}
spring.datasource.hikari.minimum-idle=${DB_HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_HIKARI_CONNECTION_TIMEOUT_MS:3000}
spring.datasource.hikari.idle-timeout=${DB_HIKARI_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_HIKARI_MAX_LIFETIME_MS:1800000}
spring.jackson.time-zone=Asia/Seoul
logging.pattern.dateformat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX,Asia/Seoul

server.compression.enabled=${SERVER_COMPRESSION_ENABLED:true}
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.compression.min-response-size=${SERVER_COMPRESSION_MIN_RESPONSE_SIZE:512}

neostride.upload.base-dir=${UPLOAD_BASE_DIR:./uploads}
neostride.upload.public-prefix=/uploads
neostride.upload.public-base-url=${UPLOAD_PUBLIC_BASE_URL:}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

jwt.secret=${JWT_SECRET:}
jwt.access-token-ttl-seconds=${JWT_ACCESS_TOKEN_TTL_SECONDS:3600}
jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Coaching AI: set OPENAI_API_KEY or neostride.ai.openai.api-key to enable real AI-generated plans/feedback.
neostride.ai.openai.api-key=${OPENAI_API_KEY:}
neostride.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
neostride.ai.openai.model=${OPENAI_MODEL:gpt-5.4-mini}
neostride.ai.openai.timeout-ms=${OPENAI_TIMEOUT_MS:8000}
