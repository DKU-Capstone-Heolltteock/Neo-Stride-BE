name: Deploy Neo-Stride Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B -ntp test

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:latest" \
            -t "${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:${{ github.sha }}" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:${{ github.sha }}"

      - name: Deploy to personal server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/neo-stride
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "ERROR: neither docker compose nor docker-compose is available." >&2
              exit 1
            fi

            $COMPOSE -p neo-stride -f docker-compose.yml pull backend

            if docker ps -a --format '{{.Names}}' | grep -Fxq neo-stride-backend; then
              docker rm -f neo-stride-backend
            fi

            $COMPOSE -p neo-stride -f docker-compose.yml up -d --remove-orphans --force-recreate backend
            $COMPOSE -p neo-stride -f docker-compose.yml ps
            $COMPOSE -p neo-stride -f docker-compose.yml logs --tail=80 backend
            docker image prune -f
