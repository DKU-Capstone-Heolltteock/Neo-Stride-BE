name: Deploy Neo-Stride Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B -ntp test

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:latest" \
            -t "${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:${{ github.sha }}" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:${{ github.sha }}"

      - name: Deploy to personal server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/neo-stride
            ./deploy.sh
