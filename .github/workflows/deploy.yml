name: Deploy Neo-Stride Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B -ntp test

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/neo-stride-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync MySQL migration files to OCI server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/mysql/**"
          target: "~/neo-stride/backend"

      - name: Deploy to OCI server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p ~/neo-stride/uploads
            docker run --rm \
              -v "$HOME/neo-stride/uploads:/data/uploads" \
              alpine:3.20 \
              sh -c 'mkdir -p /data/uploads/community /data/uploads/routes /data/uploads/profile && chmod -R 0777 /data/uploads'
            cd ~/neo-stride/backend
            chmod +x deploy/mysql/apply-migrations.sh
            MYSQL_CONTAINER=neostride-mysql USE_CONTAINER_MYSQL_ENV=true deploy/mysql/apply-migrations.sh
            MYSQL_CONTAINER=neostride-mysql USE_CONTAINER_MYSQL_ENV=true deploy/mysql/apply-migrations.sh --verify
            ./deploy.sh
